<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ Mission Intel — Genesis 3</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:30px 20px}
  .header{text-align:center;margin-bottom:36px}
  .header h1{font-size:1.8rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase}
  .header p{color:#8b949e;margin-top:8px;font-size:.95rem}
  .badge{display:inline-block;background:#1f2d3d;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:.8rem;color:#58a6ff;margin-top:10px;letter-spacing:1px}
  .question-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:20px;transition:border-color .2s}
  .question-card.correct{border-color:#3fb950}.question-card.wrong{border-color:#f85149}
  .question-number{font-size:.75rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .question-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px}
  .question-text{font-size:1.05rem;line-height:1.6;color:#e6edf3;flex:1}
  .hint-btn{background:#1f2d3d;border:1px solid #58a6ff;color:#58a6ff;border-radius:50%;width:26px;height:26px;font-size:.8rem;font-weight:bold;cursor:pointer;flex-shrink:0;margin-top:2px;transition:background .15s;display:flex;align-items:center;justify-content:center}
  .hint-btn:hover{background:#253142}.hint-btn.used{border-color:#d29922;color:#d29922}
  .hint-box{background:#1c2a1a;border:1px solid #d29922;border-radius:8px;padding:10px 14px;font-size:.88rem;color:#d29922;margin-bottom:14px;display:none}
  .hint-box.visible{display:block}
  .options{display:flex;flex-direction:column;gap:10px}
  .option{background:#1f2d3d;border:1px solid #30363d;border-radius:8px;padding:12px 16px;cursor:pointer;font-size:.95rem;color:#c9d1d9;transition:background .15s,border-color .15s,transform .1s;display:flex;align-items:center;gap:12px}
  .option:hover:not(.disabled){background:#253142;border-color:#58a6ff;transform:translateX(4px)}
  .option .letter{background:#0d1117;border:1px solid #30363d;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold;flex-shrink:0;color:#58a6ff}
  .option.selected-correct{background:#1a3a2a;border-color:#3fb950;color:#3fb950}
  .option.selected-correct .letter{border-color:#3fb950;color:#3fb950}
  .option.selected-wrong{background:#3a1a1a;border-color:#f85149;color:#f85149}
  .option.selected-wrong .letter{border-color:#f85149;color:#f85149}
  .option.show-correct{background:#1a3a2a;border-color:#3fb950;color:#3fb950;opacity:.7}
  .option.show-correct .letter{border-color:#3fb950;color:#3fb950}
  .option.disabled{cursor:default}
  .feedback{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:.9rem;display:none}
  .feedback.correct{background:#1a3a2a;border:1px solid #3fb950;color:#3fb950;display:block}
  .feedback.wrong{background:#3a1a1a;border:1px solid #f85149;color:#f85149;display:block}
  .result-box{background:#161b22;border:2px solid #58a6ff;border-radius:16px;padding:36px;text-align:center;margin-top:30px;display:none}
  .result-box h2{font-size:1.6rem;color:#58a6ff;margin-bottom:10px}
  .result-score{font-size:3.5rem;font-weight:bold;margin:16px 0}
  .result-rank{font-size:1.1rem;color:#8b949e;margin-bottom:24px}
  .rank-badge{display:inline-block;background:#1f2d3d;border:1px solid #58a6ff;border-radius:12px;padding:8px 20px;font-size:1rem;color:#58a6ff;margin-bottom:24px}
  .retry-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:12px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:background .2s}
  .retry-btn:hover{background:#79bbff}
  .progress-bar-wrap{background:#1f2d3d;border-radius:20px;height:6px;margin-bottom:32px;overflow:hidden}
  .progress-bar{height:100%;background:#58a6ff;border-radius:20px;width:0%;transition:width .4s ease}
</style>
</head>
<body>
<div class="header">
  <h1>✈️ Mission Intel</h1>
  <p>Genesis 3 — The Fall</p>
  <div class="badge">GENESIS 3 · 12 QUESTIONS · CADET LEVEL</div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div id="quiz"></div>
<div class="result-box" id="resultBox">
  <h2>✈️ Debrief Complete</h2>
  <div class="result-score" id="resultScore"></div>
  <div class="result-rank" id="resultRank"></div>
  <div class="rank-badge" id="rankBadge"></div><br>
  <button class="retry-btn" onclick="resetQuiz()">🔄 Fly Again</button>
</div>
<script>
const questions=[
  {
    question:"What did the serpent ask Eve to twist her understanding of God's command?",
    options:["Did God say you cannot eat from the tree of life?","Did God really say you cannot eat from any tree in the garden?","Did God say the fruit would taste bad?","Did God say you would become animals if you ate?"],
    answer:1,
    hint:"The serpent slightly changed what God actually said to create doubt. He made it sound more extreme than it was.",
    feedback:"The serpent asked 'Did God really say you cannot eat from any tree?' — twisting God's actual command. God only forbade one tree, but the serpent made it sound like God banned all of them. This is how deception works — a small twist creates big confusion. (Genesis 3:1)"
  },
  {
    question:"What did the serpent promise would happen if Eve ate the fruit?",
    options:["She would gain wings and fly","Her eyes would be opened and she would be like God, knowing good and evil","She would live forever","She would become the most beautiful creature in the garden"],
    answer:1,
    hint:"The serpent made two promises — one about seeing clearly and one about becoming like God.",
    feedback:"The serpent promised that their eyes would be opened and they would be like God, knowing good and evil. This was a half-truth — their eyes were opened, but what they saw brought shame and suffering, not glory. (Genesis 3:5)"
  },
  {
    question:"Why did Eve decide to eat the fruit?",
    options:["She was very hungry","The serpent forced her to eat it","She saw it was good for food, pleasing to the eye, and desirable for wisdom","God told her it was okay to try it"],
    answer:2,
    hint:"Three things attracted Eve to the fruit — think about what you see, what you want, and what you desire to gain.",
    feedback:"Eve saw the fruit was good for food, pleasing to the eye, and desirable for gaining wisdom. These three temptations — physical appetite, beauty, and pride — are patterns of temptation that still exist today. (Genesis 3:6)"
  },
  {
    question:"What happened immediately after Adam and Eve ate the fruit?",
    options:["They became very sick","They fell asleep","Their eyes were opened and they knew they were naked","Lightning struck the tree"],
    answer:2,
    hint:"The serpent said their eyes would be opened — and in a way, they were. But what they saw first surprised them.",
    feedback:"Their eyes were opened and they realized they were naked. Instead of wisdom and glory, the first thing they felt was shame. They quickly made coverings from fig leaves. (Genesis 3:7)"
  },
  {
    question:"What did Adam and Eve do when they heard God walking in the garden?",
    options:["They ran toward God to confess","They hid among the trees of the garden","They called out to God","They ate more fruit to feel better"],
    answer:1,
    hint:"Sin always makes us want to hide from God — Adam and Eve were the first example of this.",
    feedback:"Adam and Eve hid themselves among the trees when they heard God. Sin had broken their relationship with God and replaced love with fear. God still came looking for them — which shows His grace. (Genesis 3:8)"
  },
  {
    question:"When God asked Adam if he had eaten from the forbidden tree, who did Adam blame?",
    options:["He blamed the serpent","He blamed no one and confessed","He blamed Eve — and indirectly blamed God for giving her to him","He said he did not remember eating it"],
    answer:2,
    hint:"Adam's answer shifted responsibility in two directions at once — to another person and to God Himself.",
    feedback:"Adam said 'The woman YOU gave me — she gave me fruit and I ate.' He blamed Eve AND indirectly blamed God for giving her to him. Refusing to take responsibility for sin is as old as the Garden. (Genesis 3:12)"
  },
  {
    question:"Who did Eve blame when God questioned her?",
    options:["She blamed Adam","She blamed herself","She blamed the serpent","She blamed the fruit"],
    answer:2,
    hint:"Eve pointed to the one who had started the deception.",
    feedback:"Eve said 'The serpent deceived me and I ate.' She blamed the serpent. While the serpent did deceive her, Eve still made the choice to eat. Both Adam and Eve failed to take full responsibility. (Genesis 3:13)"
  },
  {
    question:"What was God's curse on the serpent?",
    options:["It would lose its wings","It would crawl on its belly and there would be enmity between it and the woman's offspring","It would become small and weak","It would never speak again"],
    answer:1,
    hint:"God gave the serpent two punishments — one about how it moves and one about a future conflict.",
    feedback:"God cursed the serpent to crawl on its belly and eat dust. He also placed enmity between the serpent and the woman's offspring. Genesis 3:15 is called the proto-evangelium — the first hint of the Gospel, where a descendant of the woman would crush the serpent's head. (Genesis 3:14-15)"
  },
  {
    question:"What did God say to Eve as part of her consequence?",
    options:["She would no longer be able to speak","She would have great pain in childbirth and her husband would rule over her","She would be removed from the garden forever","She would lose her memory of the garden"],
    answer:1,
    hint:"God gave Eve two consequences — one about having children and one about her relationship with her husband.",
    feedback:"God told Eve she would have great pain in childbirth, and that her husband would rule over her. These consequences affected the family — the most important relationship God had designed. (Genesis 3:16)"
  },
  {
    question:"What was God's consequence for Adam?",
    options:["He would no longer be able to name animals","The ground was cursed — he would work hard for food and return to dust","He would be separated from Eve","He would forget how to speak"],
    answer:1,
    hint:"Adam's punishment was connected to his job — working the ground — and ended with a reminder of where he came from.",
    feedback:"God cursed the ground so that work became hard and full of struggle. He told Adam he would eat by the sweat of his face until he returned to the dust from which he came: 'For you are dust, and to dust you shall return.' (Genesis 3:17-19)"
  },
  {
    question:"What did God make for Adam and Eve before sending them out of the garden?",
    options:["Shoes made of wood","Garments made of animal skins","Armor to protect them","A map of the land outside Eden"],
    answer:1,
    hint:"God replaced their fig leaf coverings with something better — something that required a sacrifice.",
    feedback:"God made garments of animal skin for Adam and Eve. This required the death of an animal — the first blood shed because of human sin. It pointed forward to God's plan to cover sin through sacrifice. (Genesis 3:21)"
  },
  {
    question:"Why did God drive Adam and Eve out of the Garden of Eden?",
    options:["Because He was angry and wanted to punish them","So they would not eat from the tree of life and live forever in their fallen state","Because the garden was no longer big enough for them","Because the serpent had taken over the garden"],
    answer:1,
    hint:"God placed a guard at the garden after they left — think about what He was protecting.",
    feedback:"God drove them out so they would not eat from the tree of life and live forever in their sinful state. He placed cherubim and a flaming sword to guard the tree. This was both a judgment and a mercy — living forever in sin would have been far worse. (Genesis 3:22-24)"
  }
];
const letters=['A','B','C','D'];
let answered=0,score=0;
function buildQuiz(){
  const c=document.getElementById('quiz');c.innerHTML='';answered=0;score=0;updateProgress();
  questions.forEach((q,qi)=>{
    const card=document.createElement('div');card.className='question-card';card.id=`card-${qi}`;
    card.innerHTML=`<div class="question-number">Question ${qi+1} of ${questions.length}</div>
      <div class="question-header"><div class="question-text">${q.question}</div>
      <button class="hint-btn" id="hint-btn-${qi}" onclick="toggleHint(${qi})" title="Need a hint?">?</button></div>
      <div class="hint-box" id="hint-${qi}">💡 Hint: ${q.hint}</div>
      <div class="options" id="options-${qi}">${q.options.map((o,oi)=>`
        <div class="option" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">
          <span class="letter">${letters[oi]}</span><span>${o}</span></div>`).join('')}</div>
      <div class="feedback" id="feedback-${qi}"></div>`;
    c.appendChild(card);
  });
  document.getElementById('resultBox').style.display='none';
}
function toggleHint(qi){
  document.getElementById(`hint-${qi}`).classList.toggle('visible');
  document.getElementById(`hint-btn-${qi}`).classList.toggle('used',document.getElementById(`hint-${qi}`).classList.contains('visible'));
}
function selectAnswer(qi,selected){
  const q=questions[qi];
  document.getElementById(`options-${qi}`).querySelectorAll('.option').forEach(o=>o.classList.add('disabled'));
  const correct=q.answer===selected;if(correct)score++;
  document.getElementById(`opt-${qi}-${selected}`).classList.add(correct?'selected-correct':'selected-wrong');
  if(!correct)document.getElementById(`opt-${qi}-${q.answer}`).classList.add('show-correct');
  document.getElementById(`card-${qi}`).classList.add(correct?'correct':'wrong');
  const f=document.getElementById(`feedback-${qi}`);
  f.className=`feedback ${correct?'correct':'wrong'}`;
  f.innerHTML=correct?`✅ Correct! ${q.feedback}`:`❌ Not quite. ${q.feedback}`;
  answered++;updateProgress();
  if(answered===questions.length)setTimeout(showResult,800);
}
function updateProgress(){document.getElementById('progressBar').style.width=(answered/questions.length*100)+'%'}
function showResult(){
  const pct=Math.round(score/questions.length*100);
  let rank,icon;
  if(pct>=90){rank="Pilot — Mastered!";icon="🦅 Pilot"}
  else if(pct>=76){rank="Officer — Strong!";icon="🎖️ Officer"}
  else if(pct>=61){rank="Airman — Solid!";icon="🌟 Airman"}
  else if(pct>=41){rank="Cadet — Getting it!";icon="✈️ Cadet"}
  else{rank="Recruit — Keep going!";icon="🪖 Recruit"}
  document.getElementById('resultScore').textContent=`${score} / ${questions.length} · ${pct}%`;
  document.getElementById('resultScore').style.color=pct>=70?'#3fb950':pct>=50?'#d29922':'#f85149';
  document.getElementById('resultRank').textContent=rank;document.getElementById('rankBadge').textContent=icon;
  const r=document.getElementById('resultBox');r.style.display='block';r.scrollIntoView({behavior:'smooth'});
}
function resetQuiz(){buildQuiz();window.scrollTo({top:0,behavior:'smooth'})}
buildQuiz();
</script>
</body>
</html>
