<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ PIE Sorter — Author's Purpose</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .header{text-align:center;margin-bottom:32px}
  .header h1{font-size:1.8rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase}
  .header p{color:#8b949e;margin-top:8px;font-size:.95rem}
  .badge{display:inline-block;background:#1f2d3d;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:.8rem;color:#58a6ff;margin-top:10px;letter-spacing:1px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:36px;width:100%;max-width:560px}
  .progress-label{font-size:.8rem;color:#8b949e;margin-bottom:8px;text-align:center}
  .progress-bar-wrap{background:#1f2d3d;border-radius:20px;height:6px;margin-bottom:28px;overflow:hidden}
  .progress-bar{height:100%;background:#58a6ff;border-radius:20px;transition:width .4s ease}
  .passage-label{font-size:.75rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .passage{font-size:1.05rem;line-height:1.75;color:#e6edf3;background:#1f2d3d;border:1px solid #30363d;border-radius:10px;padding:20px 24px;margin-bottom:28px;min-height:90px}
  .pie-btns{display:flex;gap:12px;margin-bottom:20px}
  .pie-btn{flex:1;border:2px solid transparent;border-radius:10px;padding:16px 8px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:transform .1s,opacity .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
  .pie-btn:hover:not(:disabled){transform:translateY(-3px)}
  .pie-btn:disabled{opacity:.35;cursor:default;transform:none}
  .pie-btn.p-btn{background:#1a2d47;border-color:#58a6ff;color:#58a6ff}
  .pie-btn.i-btn{background:#1a3a2a;border-color:#3fb950;color:#3fb950}
  .pie-btn.e-btn{background:#3a2c10;border-color:#d29922;color:#d29922}
  .pie-letter{font-size:2rem;font-weight:900;line-height:1}
  .pie-word{font-size:.72rem;letter-spacing:1px;opacity:.85}
  .feedback-box{border-radius:10px;padding:14px 18px;font-size:.91rem;line-height:1.65;margin-bottom:20px;display:none}
  .feedback-box.correct{background:#1a3a2a;border:1px solid #3fb950;color:#3fb950;display:block}
  .feedback-box.wrong{background:#3a1a1a;border:1px solid #f85149;color:#f85149;display:block}
  .next-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:13px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;width:100%;transition:background .2s;display:none}
  .next-btn:hover{background:#79bbff}
  .result-card{background:#161b22;border:2px solid #58a6ff;border-radius:16px;padding:40px;width:100%;max-width:560px;text-align:center;display:none}
  .result-card h2{font-size:1.6rem;color:#58a6ff;margin-bottom:16px}
  .big-score{font-size:4rem;font-weight:bold;margin:12px 0}
  .result-rank{font-size:1.05rem;margin:16px 0;color:#8b949e}
  .rank-badge{display:inline-block;background:#1f2d3d;border:1px solid #58a6ff;border-radius:12px;padding:8px 20px;font-size:1rem;color:#58a6ff;margin-bottom:24px}
  .retry-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:12px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:background .2s}
  .retry-btn:hover{background:#79bbff}
</style>
</head>
<body>
<div class="header">
  <h1>✈️ PIE Sorter</h1>
  <p>Author's Purpose — Read and Sort Each Passage</p>
  <div class="badge">READ · DECIDE · SORT</div>
</div>

<div class="card" id="quizCard">
  <div class="progress-label" id="progressLabel">Passage 1 of 12</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="passage-label">What is the author's purpose?</div>
  <div class="passage" id="passage"></div>
  <div class="pie-btns">
    <button class="pie-btn p-btn" id="btnP" onclick="select('P')">
      <span class="pie-letter">P</span><span class="pie-word">Persuade</span>
    </button>
    <button class="pie-btn i-btn" id="btnI" onclick="select('I')">
      <span class="pie-letter">I</span><span class="pie-word">Inform</span>
    </button>
    <button class="pie-btn e-btn" id="btnE" onclick="select('E')">
      <span class="pie-letter">E</span><span class="pie-word">Entertain</span>
    </button>
  </div>
  <div class="feedback-box" id="feedbackBox"></div>
  <button class="next-btn" id="nextBtn" onclick="nextPassage()">Next →</button>
</div>

<div class="result-card" id="resultCard">
  <h2>✈️ Mission Debrief</h2>
  <div class="big-score" id="resultScore"></div>
  <div class="result-rank" id="resultRank"></div>
  <div class="rank-badge" id="rankBadge"></div><br><br>
  <button class="retry-btn" onclick="reset()">🔄 Fly Again</button>
</div>

<script>
const passages=[
  {
    text:"You should never skip breakfast. It gives your brain the fuel it needs to think clearly, and students who eat breakfast score higher on tests. Start your day right — eat before you learn.",
    answer:'P',
    feedback:"Persuade — The word 'never,' the strong claim about test scores, and the direct command at the end are all designed to convince you to change your behavior. That's persuasion."
  },
  {
    text:"The average breakfast contains between 300 and 600 calories. Nutritionists recommend eating within two hours of waking up to support a healthy metabolism throughout the day.",
    answer:'I',
    feedback:"Inform — No opinions, no commands. Just neutral facts and expert recommendations. The author's only goal is to teach you something, not convince you of anything."
  },
  {
    text:"Sam stared at his cereal, watching the milk swirl slowly as the spoon dipped and rose. Outside, rain tapped the window like impatient fingers. Today was going to be different — he could feel it.",
    answer:'E',
    feedback:"Entertain — Vivid description, a simile ('like impatient fingers'), and suspense about what comes next. This is a story built to pull you in. That's entertainment."
  },
  {
    text:"Dogs make the best pets. They are loyal, fun, and will always be there for you — unlike cats, who mostly pretend you don't exist.",
    answer:'P',
    feedback:"Persuade — 'Dogs make the BEST pets' is a strong opinion. Comparing dogs to cats while putting cats down is a classic persuasive move. The author wants you to agree with them."
  },
  {
    text:"There are over 340 recognized dog breeds worldwide. Dogs were first domesticated from wolves approximately 15,000 years ago, making them the oldest domesticated animal on record.",
    answer:'I',
    feedback:"Inform — Specific numbers, historical facts, and zero opinions. The author is sharing knowledge, not convincing you of anything. Pure information."
  },
  {
    text:"Rex bolted through the field, ears flat, legs pumping like pistons — chasing something only he could smell. The fence was fifty feet away. Then forty. Then the world went sideways.",
    answer:'E',
    feedback:"Entertain — Fast-paced action, a simile, and a cliffhanger ending. This is built to create excitement and make you want to keep reading. Entertain."
  },
  {
    text:"Our school cafeteria needs better food options. Students who eat nutritious lunches perform better in class, and right now we are being served the same five meals every single week. Sign the petition today.",
    answer:'P',
    feedback:"Persuade — The author is making a case for change, uses evidence to support their argument, and ends with a direct call to action. That's persuasion."
  },
  {
    text:"The human body contains 206 bones. The smallest bone is the stirrup, located inside the ear. It is only about 3 millimeters long — roughly the size of a grain of rice.",
    answer:'I',
    feedback:"Inform — Factual, specific, no opinion or emotion. The author's only goal is to teach you something interesting about the human body. That's informative writing."
  },
  {
    text:"The dragon unfolded its wings slowly. Each dark scale caught the firelight, shimmering like oil on water. Mira stepped back — and in that moment, she forgot to breathe.",
    answer:'E',
    feedback:"Entertain — Fantasy setting, vivid imagery, a simile, and an emotional moment. The entire goal is to make you feel something. That's entertainment."
  },
  {
    text:"You have a responsibility to vote. Every election decided by a small margin proves that your voice matters. If you stay silent, you let someone else make the decisions for you.",
    answer:'P',
    feedback:"Persuade — Words like 'responsibility,' the appeal to urgency, and the warning about consequences are all designed to motivate you to act. Classic persuasion."
  },
  {
    text:"Photosynthesis is the process by which plants convert sunlight, water, and carbon dioxide into glucose and oxygen. This process forms the foundation of most food chains on Earth.",
    answer:'I',
    feedback:"Inform — A clear scientific definition with no opinion or emotion. The author wants to explain a process accurately. That's inform."
  },
  {
    text:"The last day of summer always tasted like melted ice cream and smelled like sunscreen and a little bit of regret. Maya sat on the porch steps, counting the hours she had left.",
    answer:'E',
    feedback:"Entertain — Unusual sensory language, nostalgia, and quiet emotion. This is creative writing designed to make you feel something specific. Entertain."
  }
];

let current=0,score=0;

function render(){
  document.getElementById('passage').textContent=passages[current].text;
  document.getElementById('progressLabel').textContent=`Passage ${current+1} of ${passages.length}`;
  document.getElementById('progressBar').style.width=`${(current/passages.length)*100}%`;
  document.getElementById('feedbackBox').className='feedback-box';
  document.getElementById('nextBtn').style.display='none';
  ['btnP','btnI','btnE'].forEach(id=>document.getElementById(id).disabled=false);
}

function select(choice){
  ['btnP','btnI','btnE'].forEach(id=>document.getElementById(id).disabled=true);
  const p=passages[current];
  const correct=choice===p.answer;
  if(correct)score++;
  const fb=document.getElementById('feedbackBox');
  fb.className='feedback-box '+(correct?'correct':'wrong');
  fb.textContent=(correct?'✅ Correct! ':'❌ Not quite. ')+p.feedback;
  const btn=document.getElementById('nextBtn');
  btn.style.display='block';
  btn.textContent=current<passages.length-1?'Next →':'See Results';
}

function nextPassage(){
  current++;
  if(current>=passages.length){showResult();return;}
  render();
}

function showResult(){
  document.getElementById('quizCard').style.display='none';
  const pct=Math.round(score/passages.length*100);
  let rank,icon;
  if(pct>=90){rank="Pilot — Mastered!";icon="🦅 Pilot"}
  else if(pct>=76){rank="Officer — Strong!";icon="🎖️ Officer"}
  else if(pct>=61){rank="Airman — Solid!";icon="🌟 Airman"}
  else if(pct>=41){rank="Cadet — Getting it!";icon="✈️ Cadet"}
  else{rank="Recruit — Keep going!";icon="🪖 Recruit"}
  document.getElementById('resultScore').textContent=`${score} / ${passages.length} · ${pct}%`;
  document.getElementById('resultScore').style.color=pct>=70?'#3fb950':pct>=50?'#d29922':'#f85149';
  document.getElementById('resultRank').textContent=rank;
  document.getElementById('rankBadge').textContent=icon;
  document.getElementById('resultCard').style.display='block';
}

function reset(){
  current=0;score=0;
  document.getElementById('quizCard').style.display='block';
  document.getElementById('resultCard').style.display='none';
  render();
}

render();
</script>
</body>
</html>
