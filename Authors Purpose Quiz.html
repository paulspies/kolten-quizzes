<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ Mission Intel — Author's Purpose</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:30px 20px}
  .header{text-align:center;margin-bottom:36px}
  .header h1{font-size:1.8rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase}
  .header p{color:#8b949e;margin-top:8px;font-size:.95rem}
  .badge{display:inline-block;background:#1f2d3d;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:.8rem;color:#58a6ff;margin-top:10px;letter-spacing:1px}
  .pie-banner{background:#1f2d3d;border:1px solid #30363d;border-radius:12px;padding:16px 24px;margin-bottom:28px;display:flex;justify-content:center;gap:32px;text-align:center}
  .pie-item{font-size:.95rem}.pie-letter{font-size:1.6rem;font-weight:bold;color:#58a6ff;display:block}
  .pie-word{color:#e6edf3}.pie-desc{font-size:.75rem;color:#8b949e;margin-top:4px}
  .question-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:20px;transition:border-color .2s}
  .question-card.correct{border-color:#3fb950}.question-card.wrong{border-color:#f85149}
  .question-number{font-size:.75rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
  .question-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px}
  .question-text{font-size:1.05rem;line-height:1.6;color:#e6edf3;flex:1}
  .hint-btn{background:#1f2d3d;border:1px solid #58a6ff;color:#58a6ff;border-radius:50%;width:26px;height:26px;font-size:.8rem;font-weight:bold;cursor:pointer;flex-shrink:0;margin-top:2px;transition:background .15s;display:flex;align-items:center;justify-content:center}
  .hint-btn:hover{background:#253142}.hint-btn.used{border-color:#d29922;color:#d29922}
  .hint-box{background:#1c2a1a;border:1px solid #d29922;border-radius:8px;padding:10px 14px;font-size:.88rem;color:#d29922;margin-bottom:14px;display:none}
  .hint-box.visible{display:block}
  .options{display:flex;flex-direction:column;gap:10px}
  .option{background:#1f2d3d;border:1px solid #30363d;border-radius:8px;padding:12px 16px;cursor:pointer;font-size:.95rem;color:#c9d1d9;transition:background .15s,border-color .15s,transform .1s;display:flex;align-items:center;gap:12px}
  .option:hover:not(.disabled){background:#253142;border-color:#58a6ff;transform:translateX(4px)}
  .option .letter{background:#0d1117;border:1px solid #30363d;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold;flex-shrink:0;color:#58a6ff}
  .option.selected-correct{background:#1a3a2a;border-color:#3fb950;color:#3fb950}
  .option.selected-correct .letter{border-color:#3fb950;color:#3fb950}
  .option.selected-wrong{background:#3a1a1a;border-color:#f85149;color:#f85149}
  .option.selected-wrong .letter{border-color:#f85149;color:#f85149}
  .option.show-correct{background:#1a3a2a;border-color:#3fb950;color:#3fb950;opacity:.7}
  .option.show-correct .letter{border-color:#3fb950;color:#3fb950}
  .option.disabled{cursor:default}
  .feedback{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:.9rem;display:none}
  .feedback.correct{background:#1a3a2a;border:1px solid #3fb950;color:#3fb950;display:block}
  .feedback.wrong{background:#3a1a1a;border:1px solid #f85149;color:#f85149;display:block}
  .result-box{background:#161b22;border:2px solid #58a6ff;border-radius:16px;padding:36px;text-align:center;margin-top:30px;display:none}
  .result-box h2{font-size:1.6rem;color:#58a6ff;margin-bottom:10px}
  .result-score{font-size:3.5rem;font-weight:bold;margin:16px 0}
  .result-rank{font-size:1.1rem;color:#8b949e;margin-bottom:24px}
  .rank-badge{display:inline-block;background:#1f2d3d;border:1px solid #58a6ff;border-radius:12px;padding:8px 20px;font-size:1rem;color:#58a6ff;margin-bottom:24px}
  .retry-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:12px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:background .2s}
  .retry-btn:hover{background:#79bbff}
  .progress-bar-wrap{background:#1f2d3d;border-radius:20px;height:6px;margin-bottom:32px;overflow:hidden}
  .progress-bar{height:100%;background:#58a6ff;border-radius:20px;width:0%;transition:width .4s ease}
</style>
</head>
<body>
<div class="header">
  <h1>✈️ Mission Intel</h1>
  <p>Author's Purpose — The PIE Method</p>
  <div class="badge">ELA · 12 QUESTIONS · CADET LEVEL</div>
</div>
<div class="pie-banner">
  <div class="pie-item"><span class="pie-letter">P</span><span class="pie-word">Persuade</span><div class="pie-desc">Convince the reader</div></div>
  <div class="pie-item"><span class="pie-letter">I</span><span class="pie-word">Inform</span><div class="pie-desc">Teach or explain</div></div>
  <div class="pie-item"><span class="pie-letter">E</span><span class="pie-word">Entertain</span><div class="pie-desc">Hold attention & create emotion</div></div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div id="quiz"></div>
<div class="result-box" id="resultBox">
  <h2>✈️ Debrief Complete</h2>
  <div class="result-score" id="resultScore"></div>
  <div class="result-rank" id="resultRank"></div>
  <div class="rank-badge" id="rankBadge"></div><br>
  <button class="retry-btn" onclick="resetQuiz()">🔄 Fly Again</button>
</div>
<script>
const questions=[
  {
    question:"What is an author's purpose?",
    options:["The title of the book","The reason why the author writes something","The main character of the story","The setting of the story"],
    answer:1,
    hint:"Think about WHY someone would write something — what they are trying to do with their words.",
    feedback:"An author's purpose is the reason why the author writes something. Knowing the purpose helps us understand the main idea of the text."
  },
  {
    question:"What does the P in PIE stand for?",
    options:["Predict","Persuade","Publish","Plot"],
    answer:1,
    hint:"This purpose means the author is trying to convince you to believe or do something.",
    feedback:"P stands for Persuade. When an author's purpose is to persuade, they are trying to convince the reader to believe something or take action. Look for strong opinions and powerful language."
  },
  {
    question:"What does the I in PIE stand for?",
    options:["Imagine","Introduce","Inform","Identify"],
    answer:2,
    hint:"This purpose means the author wants to teach, explain, or describe something — keeping it neutral.",
    feedback:"I stands for Inform. When an author informs, they want to teach, explain, or describe something. Their goal is to give the reader useful facts or knowledge."
  },
  {
    question:"What does the E in PIE stand for?",
    options:["Explain","Edit","Entertain","Examine"],
    answer:2,
    hint:"This purpose means the author wants to hold your attention and make you feel emotions.",
    feedback:"E stands for Entertain. When an author entertains, they want to hold the reader's attention and create emotions — happiness, excitement, fear, suspense, or laughter."
  },
  {
    question:"Which book title has the purpose of PERSUADING the reader?",
    options:["The Taco Stand of Terror: A Spooky Tale","The Skin Benefits of Guacamole","Guacamole: The Superfood You Need to Add to Your Breakfast","How Guacamole is Made"],
    answer:2,
    hint:"Look for the title that sounds like it's trying to convince you to do or believe something — like it has an opinion.",
    feedback:"'Guacamole: The Superfood You Need to Add to Your Breakfast' is persuasive — it tells you what you NEED to do. That's a clear opinion trying to convince the reader. That's persuade."
  },
  {
    question:"Which book title has the purpose of INFORMING the reader?",
    options:["Guacamole: The Superfood You Need to Add to Your Breakfast","The Skin Benefits of Guacamole","The Taco Stand of Terror: A Spooky Tale","Why You Must Eat Guacamole Every Day"],
    answer:1,
    hint:"Look for the title that sounds neutral — just sharing facts or teaching something without telling you what to do.",
    feedback:"'The Skin Benefits of Guacamole' sounds neutral and educational — it's sharing information about health benefits. No strong opinion, no story. That's inform."
  },
  {
    question:"Which book title has the purpose of ENTERTAINING the reader?",
    options:["The Skin Benefits of Guacamole","How to Make Perfect Guacamole","Guacamole: The Superfood You Must Eat","The Taco Stand of Terror: A Spooky Tale of Ghostly Peppers"],
    answer:3,
    hint:"Look for the title that sounds exciting, funny, or scary — like it's telling a story to keep your attention.",
    feedback:"'The Taco Stand of Terror: A Spooky Tale of Ghostly Peppers' is clearly meant to entertain — it's a spooky story designed to create excitement and emotion in the reader."
  },
  {
    question:"Can an author have MORE than one purpose in the same piece of writing?",
    options:["No — every piece of writing has exactly one purpose","Yes — a text can persuade AND entertain at the same time","No — you must pick only one from PIE","Only in textbooks"],
    answer:1,
    hint:"Think about a story that teaches you something while also being exciting. Can it do both?",
    feedback:"Yes! An author can have more than one purpose. A story might entertain you while also informing your worldview. Always look for all the purposes — not just the most obvious one."
  },
  {
    question:"In the excerpt from 'The House on Mango Street,' what were the TWO purposes?",
    options:["Persuade and Entertain","Inform and Persuade","Entertain and Inform","Entertain only"],
    answer:2,
    hint:"It was a story — so one purpose was to entertain. But it also taught the reader something about what it's like to belong to two cultures.",
    feedback:"The passage had two purposes: to Entertain (it's a story about Esperanza's experience) and to Inform (it teaches the reader what it's like to be a bilingual Mexican American living between two cultures)."
  },
  {
    question:"What clue should you look for in a text to figure out the author's purpose?",
    options:["The number of chapters","The author's name","The word choice and language used","The length of the sentences"],
    answer:2,
    hint:"The lesson said this one thing is the most important thing to examine when figuring out purpose.",
    feedback:"Word choice is the key clue. Strong, opinionated language = persuade. Neutral, factual language = inform. Exciting, emotional language = entertain. Always examine how the author chose their words."
  },
  {
    question:"A note says: 'Chew Barka ate the pie — and you should be nicer to him.' What are the TWO purposes of this note?",
    options:["Entertain and Inform","Persuade and Entertain","Inform and Persuade","Inform only"],
    answer:2,
    hint:"The note tells you something happened (that's one purpose) AND it tries to change your behavior (that's another).",
    feedback:"The note has two purposes: to Inform (telling who ate the pie) and to Persuade (convincing you to be nicer to Chew Barka). It had a hidden agenda — which is very common in persuasive writing!"
  },
  {
    question:"Why is it important to determine an author's purpose when you read?",
    options:["So you can count the number of facts in the text","So you can figure out if the author is famous","It helps you understand the main idea and what the author wants you to take away","So you can decide if the book has good pictures"],
    answer:2,
    hint:"The lesson said determining purpose helps you understand something very important about the text.",
    feedback:"Determining an author's purpose helps you understand the main idea of the text and what the author wants you to think, feel, or do. It makes you a smarter, more active reader — like a detective cracking the case."
  }
];
const letters=['A','B','C','D'];
let answered=0,score=0;
function buildQuiz(){
  const c=document.getElementById('quiz');c.innerHTML='';answered=0;score=0;updateProgress();
  questions.forEach((q,qi)=>{
    const card=document.createElement('div');card.className='question-card';card.id=`card-${qi}`;
    card.innerHTML=`<div class="question-number">Question ${qi+1} of ${questions.length}</div>
      <div class="question-header"><div class="question-text">${q.question}</div>
      <button class="hint-btn" id="hint-btn-${qi}" onclick="toggleHint(${qi})" title="Need a hint?">?</button></div>
      <div class="hint-box" id="hint-${qi}">💡 Hint: ${q.hint}</div>
      <div class="options" id="options-${qi}">${q.options.map((o,oi)=>`
        <div class="option" id="opt-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})">
          <span class="letter">${letters[oi]}</span><span>${o}</span></div>`).join('')}</div>
      <div class="feedback" id="feedback-${qi}"></div>`;
    c.appendChild(card);
  });
  document.getElementById('resultBox').style.display='none';
}
function toggleHint(qi){
  document.getElementById(`hint-${qi}`).classList.toggle('visible');
  document.getElementById(`hint-btn-${qi}`).classList.toggle('used',document.getElementById(`hint-${qi}`).classList.contains('visible'));
}
function selectAnswer(qi,selected){
  const q=questions[qi];
  document.getElementById(`options-${qi}`).querySelectorAll('.option').forEach(o=>o.classList.add('disabled'));
  const correct=q.answer===selected;if(correct)score++;
  document.getElementById(`opt-${qi}-${selected}`).classList.add(correct?'selected-correct':'selected-wrong');
  if(!correct)document.getElementById(`opt-${qi}-${q.answer}`).classList.add('show-correct');
  document.getElementById(`card-${qi}`).classList.add(correct?'correct':'wrong');
  const f=document.getElementById(`feedback-${qi}`);
  f.className=`feedback ${correct?'correct':'wrong'}`;
  f.innerHTML=correct?`✅ Correct! ${q.feedback}`:`❌ Not quite. ${q.feedback}`;
  answered++;updateProgress();
  if(answered===questions.length)setTimeout(showResult,800);
}
function updateProgress(){document.getElementById('progressBar').style.width=(answered/questions.length*100)+'%'}
function showResult(){
  const pct=Math.round(score/questions.length*100);
  let rank,icon;
  if(pct>=90){rank="Pilot — Mastered!";icon="🦅 Pilot"}
  else if(pct>=76){rank="Officer — Strong!";icon="🎖️ Officer"}
  else if(pct>=61){rank="Airman — Solid!";icon="🌟 Airman"}
  else if(pct>=41){rank="Cadet — Getting it!";icon="✈️ Cadet"}
  else{rank="Recruit — Keep going!";icon="🪖 Recruit"}
  document.getElementById('resultScore').textContent=`${score} / ${questions.length} · ${pct}%`;
  document.getElementById('resultScore').style.color=pct>=70?'#3fb950':pct>=50?'#d29922':'#f85149';
  document.getElementById('resultRank').textContent=rank;document.getElementById('rankBadge').textContent=icon;
  const r=document.getElementById('resultBox');r.style.display='block';r.scrollIntoView({behavior:'smooth'});
}
function resetQuiz(){buildQuiz();window.scrollTo({top:0,behavior:'smooth'})}
buildQuiz();
</script>
</body>
</html>
