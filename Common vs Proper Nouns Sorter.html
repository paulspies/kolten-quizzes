<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ Noun Sorter — Common vs. Proper</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .header{text-align:center;margin-bottom:32px}
  .header h1{font-size:1.8rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase}
  .header p{color:#8b949e;margin-top:8px;font-size:.95rem}
  .badge{display:inline-block;background:#1f2d3d;border:1px solid #30363d;border-radius:20px;padding:4px 14px;font-size:.8rem;color:#58a6ff;margin-top:10px;letter-spacing:1px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:36px;width:100%;max-width:560px}
  .progress-label{font-size:.8rem;color:#8b949e;margin-bottom:8px;text-align:center}
  .progress-bar-wrap{background:#1f2d3d;border-radius:20px;height:6px;margin-bottom:28px;overflow:hidden}
  .progress-bar{height:100%;background:#58a6ff;border-radius:20px;transition:width .4s ease}
  .word-label{font-size:.75rem;color:#58a6ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .word-display{font-size:2rem;font-weight:bold;color:#e6edf3;background:#1f2d3d;border:1px solid #30363d;border-radius:10px;padding:24px;margin-bottom:28px;text-align:center;letter-spacing:1px}
  .sort-btns{display:flex;gap:12px;margin-bottom:20px}
  .sort-btn{flex:1;border:2px solid transparent;border-radius:10px;padding:16px 8px;font-size:.95rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:transform .1s,opacity .15s;display:flex;flex-direction:column;align-items:center;gap:6px}
  .sort-btn:hover:not(:disabled){transform:translateY(-3px)}
  .sort-btn:disabled{opacity:.35;cursor:default;transform:none}
  .sort-btn.common-btn{background:#1a2d47;border-color:#58a6ff;color:#58a6ff}
  .sort-btn.proper-btn{background:#2a1a3a;border-color:#bc8cff;color:#bc8cff}
  .btn-label{font-size:1.3rem;font-weight:900;line-height:1}
  .btn-word{font-size:.72rem;letter-spacing:1px;opacity:.85}
  .feedback-box{border-radius:10px;padding:14px 18px;font-size:.91rem;line-height:1.65;margin-bottom:20px;display:none}
  .feedback-box.correct{background:#1a3a2a;border:1px solid #3fb950;color:#3fb950;display:block}
  .feedback-box.wrong{background:#3a1a1a;border:1px solid #f85149;color:#f85149;display:block}
  .next-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:13px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;width:100%;transition:background .2s;display:none}
  .next-btn:hover{background:#79bbff}
  .result-card{background:#161b22;border:2px solid #58a6ff;border-radius:16px;padding:40px;width:100%;max-width:560px;text-align:center;display:none}
  .result-card h2{font-size:1.6rem;color:#58a6ff;margin-bottom:16px}
  .big-score{font-size:4rem;font-weight:bold;margin:12px 0}
  .result-rank{font-size:1.05rem;margin:16px 0;color:#8b949e}
  .rank-badge{display:inline-block;background:#1f2d3d;border:1px solid #58a6ff;border-radius:12px;padding:8px 20px;font-size:1rem;color:#58a6ff;margin-bottom:24px}
  .retry-btn{background:#58a6ff;color:#0d1117;border:none;border-radius:8px;padding:12px 32px;font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:background .2s}
  .retry-btn:hover{background:#79bbff}
</style>
</head>
<body>
<div class="header">
  <h1>✈️ Noun Sorter</h1>
  <p>Common vs. Proper Nouns — Sort Each Word</p>
  <div class="badge">READ · DECIDE · SORT</div>
</div>
<div class="card" id="quizCard">
  <div class="progress-label" id="progressLabel">Word 1 of 12</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="word-label">Is this noun common or proper?</div>
  <div class="word-display" id="wordDisplay"></div>
  <div class="sort-btns">
    <button class="sort-btn common-btn" id="btnCommon" onclick="sortWord('common')">
      <span class="btn-label">C</span><span class="btn-word">Common</span>
    </button>
    <button class="sort-btn proper-btn" id="btnProper" onclick="sortWord('proper')">
      <span class="btn-label">P</span><span class="btn-word">Proper</span>
    </button>
  </div>
  <div class="feedback-box" id="feedbackBox"></div>
  <button class="next-btn" id="nextBtn" onclick="nextWord()">Next →</button>
</div>
<div class="result-card" id="resultCard">
  <h2>✈️ Mission Debrief</h2>
  <div class="big-score" id="resultScore"></div>
  <div class="result-rank" id="resultRank"></div>
  <div class="rank-badge" id="rankBadge"></div><br><br>
  <button class="retry-btn" onclick="reset()">🔄 Fly Again</button>
</div>
<script>
const words=[
  {word:"city",answer:"common",feedback:"'City' is a common noun — it names a general type of place, not one specific city."},
  {word:"Texas",answer:"proper",feedback:"'Texas' is a proper noun — it names one specific state and is always capitalized."},
  {word:"river",answer:"common",feedback:"'River' is a common noun — it names a type of water feature, not a specific one."},
  {word:"Mississippi",answer:"proper",feedback:"'Mississippi' is a proper noun — it names one specific river (or state) and is always capitalized."},
  {word:"pilot",answer:"common",feedback:"'Pilot' is a common noun — it names a type of person, not a specific individual."},
  {word:"Kolten",answer:"proper",feedback:"'Kolten' is a proper noun — it is the name of a specific person and is always capitalized."},
  {word:"country",answer:"common",feedback:"'Country' is a common noun — it names a general category of place, not one specific country."},
  {word:"America",answer:"proper",feedback:"'America' is a proper noun — it is the official name of a specific country and is always capitalized."},
  {word:"month",answer:"common",feedback:"'Month' is a common noun — it names a general unit of time, not a specific month."},
  {word:"June",answer:"proper",feedback:"'June' is a proper noun — it is the name of a specific month and is always capitalized."},
  {word:"airplane",answer:"common",feedback:"'Airplane' is a common noun — it names a type of vehicle, not a specific model."},
  {word:"F-16",answer:"proper",feedback:"'F-16' is a proper noun — it is the official designation of a specific aircraft model and is capitalized."}
];
let current=0,score=0;
function showWord(){
  document.getElementById('wordDisplay').textContent=words[current].word;
  document.getElementById('progressLabel').textContent=`Word ${current+1} of ${words.length}`;
  document.getElementById('progressBar').style.width=((current/words.length)*100)+'%';
  document.getElementById('feedbackBox').style.display='none';
  document.getElementById('feedbackBox').className='feedback-box';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('btnCommon').disabled=false;
  document.getElementById('btnProper').disabled=false;
}
function sortWord(choice){
  const w=words[current];
  const correct=choice===w.answer;
  if(correct)score++;
  document.getElementById('btnCommon').disabled=true;
  document.getElementById('btnProper').disabled=true;
  const fb=document.getElementById('feedbackBox');
  fb.className=`feedback-box ${correct?'correct':'wrong'}`;
  fb.innerHTML=correct?`✅ Correct! ${w.feedback}`:`❌ Not quite. ${w.feedback}`;
  document.getElementById('nextBtn').style.display='block';
}
function nextWord(){
  current++;
  if(current<words.length){showWord();}
  else{showResult();}
}
function showResult(){
  document.getElementById('quizCard').style.display='none';
  const pct=Math.round(score/words.length*100);
  let rank,icon;
  if(pct>=90){rank="Pilot — Mastered!";icon="🦅 Pilot"}
  else if(pct>=76){rank="Officer — Strong!";icon="🎖️ Officer"}
  else if(pct>=61){rank="Airman — Solid!";icon="🌟 Airman"}
  else if(pct>=41){rank="Cadet — Getting it!";icon="✈️ Cadet"}
  else{rank="Recruit — Keep going!";icon="🪖 Recruit"}
  document.getElementById('resultScore').textContent=`${score} / ${words.length} · ${pct}%`;
  document.getElementById('resultScore').style.color=pct>=70?'#3fb950':pct>=50?'#d29922':'#f85149';
  document.getElementById('resultRank').textContent=rank;
  document.getElementById('rankBadge').textContent=icon;
  document.getElementById('resultCard').style.display='block';
}
function reset(){
  current=0;score=0;
  document.getElementById('quizCard').style.display='block';
  document.getElementById('resultCard').style.display='none';
  showWord();
}
showWord();
</script>
</body>
</html>
